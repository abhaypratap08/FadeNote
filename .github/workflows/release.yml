name: Auto Release & Publish

on:
  push:
    tags:
      - 'v*.*'        # triggers on tags like v1.0, v2.1.3, etc.

permissions:
  contents: write    # needed to create GitHub Releases

jobs:
  build-and-release:
    name: Build APK & Publish Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle permissions ──────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 4. (Optional) Decode keystore for signed release builds ───────────
      #   Skip this block if you want unsigned debug builds for now.
      #   To use it:
      #     1. Base64-encode your keystore:  base64 -w 0 your.keystore
      #     2. Add these secrets in repo Settings → Secrets → Actions:
      #          KEYSTORE_BASE64, KEYSTORE_PASSWORD,
      #          KEY_ALIAS, KEY_PASSWORD
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      # ── 5. Build ───────────────────────────────────────────────────────────
      #   Signed release build (uses keystore if secrets are set)
      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      # ── 6. Locate APK ──────────────────────────────────────────────────────
      - name: Find APK path
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          # Rename to a friendlier filename
          FRIENDLY="FadeNote-${{ github.ref_name }}.apk"
          cp "$APK" "$FRIENDLY"
          echo "friendly=$FRIENDLY" >> $GITHUB_OUTPUT

      # ── 7. Extract version tag for release notes ───────────────────────────
      - name: Parse version tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"            # e.g. v1.2
          echo "version=$TAG" >> $GITHUB_OUTPUT
          # Build a changelog from commits since the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges)
          fi
          # Write to a file so newlines survive the env export
          echo "$LOG" > CHANGELOG.md
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      # ── 8. Create GitHub Release & upload APK ─────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "FadeNote ${{ steps.tag.outputs.version }}"
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: ${{ steps.apk.outputs.friendly }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
