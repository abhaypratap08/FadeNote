name: Auto Release & Publish

on:
  push:
    tags:
      - 'v*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Find APK path
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          FRIENDLY="FadeNote-${{ github.ref_name }}.apk"
          cp "$APK" "$FRIENDLY"
          echo "friendly=$FRIENDLY" >> $GITHUB_OUTPUT

      - name: Parse version tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          echo "version=$TAG" >> $GITHUB_OUTPUT
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges)
          fi
          echo "$LOG" > CHANGELOG.md
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "FadeNote ${{ steps.tag.outputs.version }}"
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: ${{ steps.apk.outputs.friendly }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
